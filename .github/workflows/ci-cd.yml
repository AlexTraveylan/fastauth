name: FastAuth CI/CD
on:
    push:
        branches:
            - "*"
    pull_request:
        branches:
            - main

permissions:
    contents: write

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python 3.13
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install uv
              run: pip install uv

            - name: Install dependencies
              run: uv sync

            - name: Run Ruff linter
              run: uv run ruff check .

            - name: Run ty type checking
              run: uv run ty check .

            - name: Run Pytest
              run: uv run pytest
